<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Our Story 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #c97b84;
    --rose-light: #f2d5d8;
    --rose-deep: #8b3a48;
    --cream: #fdf6f0;
    --gold: #c9a96e;
    --brown: #5c3d2e;
    --text: #3a2625;
    --text-muted: #8a6f6f;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating petals */
  .petal {
    position: fixed;
    pointer-events: none;
    animation: fall linear infinite;
    opacity: 0;
    font-size: 18px;
    z-index: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Background watermark hearts */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(201,123,132,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(201,169,110,0.08) 0%, transparent 50%);
    z-index: 0;
  }

  /* Login Card */
  .login-card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(201,123,132,0.25);
    border-radius: 28px;
    padding: 56px 48px;
    width: min(440px, 92vw);
    box-shadow: 0 8px 60px rgba(139,58,72,0.12), 0 2px 12px rgba(139,58,72,0.06);
    text-align: center;
    animation: fadeUp 1s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lock-icon {
    font-size: 40px;
    margin-bottom: 8px;
    animation: heartbeat 2.5s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%      { transform: scale(1.12); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.07); }
    56%      { transform: scale(1); }
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 5vw, 34px);
    color: var(--rose-deep);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .login-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 36px;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--rose-light); }
  .divider-heart { color: var(--rose); font-size: 12px; }

  label {
    display: block;
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    margin-top: 18px;
  }
  label:first-of-type { margin-top: 0; }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--rose-light);
    border-radius: 12px;
    background: rgba(255,255,255,0.7);
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  input:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(201,123,132,0.15);
  }

  .login-btn {
    width: 100%;
    margin-top: 28px;
    padding: 15px;
    background: linear-gradient(135deg, var(--rose-deep), var(--rose));
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(139,58,72,0.3);
  }
  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(139,58,72,0.4);
  }
  .login-btn:active { transform: scale(0.98); }

  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  .error-msg {
    margin-top: 12px;
    color: #b94040;
    font-size: 13px;
    display: none;
  }

  /* Decorative corner roses */
  .corner-deco {
    position: fixed;
    font-size: 80px;
    opacity: 0.07;
    pointer-events: none;
    z-index: 1;
  }
  .corner-deco.tl { top: -10px; left: -10px; transform: rotate(-20deg); }
  .corner-deco.br { bottom: -10px; right: -10px; transform: rotate(160deg); }

  @media (max-width: 480px) {
    .login-card { padding: 40px 28px; }
  }
</style>
</head>
<body>

<span class="corner-deco tl">🌹</span>
<span class="corner-deco br">🌹</span>

<div class="login-card">
  <div class="lock-icon">💌</div>
  <h1 class="login-title">Our Secret Garden</h1>
  <p class="login-subtitle">hanya untuk kita berdua</p>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-heart">❤</span>
    <div class="divider-line"></div>
  </div>

  <label for="username">Siapakah kamu?</label>
  <input type="text" id="username" placeholder="nama kita..." autocomplete="off">

  <label for="password">Kata sandi rahasia</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="off">

  <p class="error-msg" id="error-msg">❌ Hmm, kata sandinya salah, sayang~</p>

  <button class="login-btn" onclick="doLogin()">Masuk ke Dunia Kita ✨</button>
  <p class="hint">🔒 Tempat ini hanya untuk kita</p>
</div>

<script>
// ===== GANTI SESUAI KEINGINANMU =====
const USERNAME = "sayang";    // username bebas
const PASSWORD = "kitaberdua"; // password rahasia kamu
// ====================================

function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const err = document.getElementById('error-msg');

  if (u === USERNAME && p === PASSWORD) {
    document.querySelector('.login-card').style.animation = 'fadeUp 0.4s ease reverse forwards';
    setTimeout(() => window.location.href = 'story.html', 400);
  } else {
    err.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').style.borderColor = '#e08080';
    setTimeout(() => {
      err.style.display = 'none';
      document.getElementById('password').style.borderColor = '';
    }, 3000);
  }
}
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Floating petals
const symbols = ['🌸','🌹','✿','❀','🌷','💮'];
for (let i = 0; i < 18; i++) {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = symbols[i % symbols.length];
  el.style.cssText = `
    left: ${Math.random()*100}vw;
    animation-duration: ${6+Math.random()*8}s;
    animation-delay: ${Math.random()*8}s;
    font-size: ${10+Math.random()*14}px;
  `;
  document.body.appendChild(el);
}
</script>
</body>
</html>
